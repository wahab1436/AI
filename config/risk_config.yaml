# Risk parameters (for future integration - not used in inference-only mode)
position_sizing:
  method: "fixed_fractional"
  risk_per_trade_pct: 1.0
  max_concurrent_trades: 3
  
stop_loss:
  method: "atr_based"
  multiplier: 1.5
  min_pips: 10
  
take_profit:
  method: "risk_reward"
  min_rr_ratio: 1.5
  targets:
    - multiplier: 1.0
      close_pct: 0.5
    - multiplier: 2.0
      close_pct: 0.5
      
drawdown_limits:
  daily_max_pct: 3.0
  weekly_max_pct: 7.0
  hard_stop_pct: 15.0
